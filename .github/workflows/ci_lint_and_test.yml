name: ci_lint_and_test
permissions: {}
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  merge_group:

jobs:
  run-tests:
    name: Run tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d testdb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_POSTGRES_URL: postgresql://postgres:postgres@127.0.0.1:5432/testdb
    steps:
      - name: Checkout source code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Set up Python 3.13
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Install Poetry
        run: pip3 install poetry==2.1.3

      - name: Install dependencies
        run: |
          poetry install --no-interaction --no-root

      - name: Run tests via make
        run: make test TEST_ARGS='-rsax -vvvv --cov --cov-branch --cov-report=xml'

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
        with:
          token: ${{ secrets.CODECOV_TOKEN }} # zizmor: ignore[secrets-outside-env]

  build-lambda-images:
    name: Build ${{ matrix.lambda }}
    if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - lambda: enrichment_lambda
            dockerfile: Dockerfile
            context: .
          - lambda: db_backup
            dockerfile: dockerfile
            context: src/lambdas/db_backup
          - lambda: update_legislation_table
            dockerfile: Dockerfile
            context: src/lambdas/update_legislation_table
          - lambda: update_rules_processor
            dockerfile: Dockerfile
            context: src/lambdas/update_rules_processor
    steps:
      - name: Checkout source code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Assemble lambda build contexts
        run: ./scripts/assemble_lambda_contexts.sh

      - name: Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
        with:
          install: true

      - name: Build ${{ matrix.lambda }}
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --progress=plain \
            --load \
            -f src/lambdas/${{ matrix.lambda }}/${{ matrix.dockerfile }} \
            ${{ matrix.context }}

  terraform_format:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        continue-on-error: false

      - name: Run Terraform format
        id: run_terraform_validate
        run: |
          set -e
          set -o pipefail
          cd terraform
          terraform fmt -check -recursive
        continue-on-error: false

  terraform_lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Install TFLint
        uses: terraform-linters/setup-tflint@b480b8fcdaa6f2c577f8e4fa799e89e756bb7c93 # v6.2.2
        with:
          tflint_version: v0.38.1
        continue-on-error: false

      - name: Run TFLint
        id: run_tflint
        run: |
          tflint --init
          tflint -f compact --loglevel warn

  terraform_validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Get terraform version
        id: get-terraform-version
        run: |
          DOTFILE_VERSION=$(cat terraform/.terraform-version)
          echo "version=$DOTFILE_VERSION" >> $GITHUB_OUTPUT

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        continue-on-error: false
        with:
          terraform_version: ${{ steps.get-terraform-version.outputs.version }}

      - name: Run Terraform Validate
        id: run_terraform_validate
        run: |
          set -e
          set -o pipefail
          cd terraform
          terraform init -backend=false
          terraform validate -no-color
        continue-on-error: false

  terraform_plan-staging:
    uses: ./.github/workflows/terraform_plan.yml
    permissions:
      contents: read
      id-token: write
    with:
      environment: staging
    secrets:
      aws_oidc_role_arn: ${{ secrets.AWS_OIDC_ROLE_ARN }}
      account_id: ${{ secrets.STAGING_ACCOUNT_ID }}
      workspace: tna-staging
      app_env: staging

  terraform_plan-production:
    uses: ./.github/workflows/terraform_plan.yml
    permissions:
      contents: read
      id-token: write
    with:
      environment: production
    secrets:
      aws_oidc_role_arn: ${{ secrets.AWS_OIDC_ROLE_ARN_PROD }}
      account_id: ${{ secrets.PROD_ACCOUNT_ID }}
      workspace: tna-prod
      app_env: production

name: terraform_plan

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
    secrets:
      aws_oidc_role_arn:
        required: true
      account_id:
        required: true
      workspace:
        required: true
      app_env:
        required: true
      vcite_enabled:
        required: true
      api_endpoint:
        required: true
      api_username:
        required: true
      api_password:
        required: true
      sparql_username:
        required: true
      sparql_password:
        required: true

jobs:
  terraform_plan:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout source code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Get terraform version
        id: get-terraform-version
        run: |
          DOTFILE_VERSION=$(cat terraform/.terraform-version)
          echo "version=$DOTFILE_VERSION" >> $GITHUB_OUTPUT

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        continue-on-error: false
        with:
          terraform_version: ${{ steps.get-terraform-version.outputs.version }}

      - name: Get AWS Credentials
        uses: aws-actions/configure-aws-credentials@e6de054238d6b7531b4efff3b6587d9aade6a06c # v6.2.3
        with:
          aws-region: eu-west-2
          role-to-assume: ${{ secrets.aws_oidc_role_arn }}
        continue-on-error: false

      - name: Terraform init
        id: run_terraform_init
        run: |
          set -e
          set -o pipefail
          cd terraform
          terraform init -upgrade -input=false -backend-config="bucket=tna-terraform-backend-state-enrichment-pipeline-${{ secrets.account_id }}"
        continue-on-error: false

      - name: Terraform Plan
        id: run_terraform_plan
        env:
          TF_VAR_vcite_enabled: ${{ secrets.vcite_enabled }}
          TF_VAR_api_endpoint: ${{ secrets.api_endpoint }}
          TF_VAR_api_username: ${{ secrets.api_username }}
          TF_VAR_api_password: ${{ secrets.api_password }}
          TF_VAR_sparql_username: ${{ secrets.sparql_username }}
          TF_VAR_sparql_password: ${{ secrets.sparql_password }}
        run: |
          set -e
          set -o pipefail
          cd terraform
          terraform workspace select ${{ secrets.workspace }}
          terraform plan -no-color -var "app_env=${{ secrets.app_env }}"

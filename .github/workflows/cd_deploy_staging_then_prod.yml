name: Deploy to Staging then Prod

on:
  push:
    branches:
      - main

permissions:
  pull-requests: read
  contents: read

defaults:
  run:
    shell: bash

jobs:
  deploy_staging:
    name: Deploy Staging Build
    uses: ./.github/workflows/deploy_single_environment.yml
    with:
      environment: staging
    secrets:
      aws_oidc_role_arn: ${{ secrets.AWS_OIDC_ROLE_ARN }}
      account_id: ${{ secrets.STAGING_ACCOUNT_ID }}
      workspace: tna-staging
      app_env: staging
      vcite_enabled: ${{ secrets.VCITE_ENABLED }}
      api_endpoint: ${{ secrets.API_ENDPOINT }}
      api_username: ${{ secrets.API_USERNAME }}
      api_password: ${{ secrets.API_PASSWORD }}
      sparql_username: ${{ secrets.SPARQL_USERNAME }}
      sparql_password: ${{ secrets.SPARQL_PASSWORD }}
    permissions:
      id-token: write

  verify_staging_e2e:
    name: Verify Staging Deployment (E2E SQS)
    needs: deploy_staging
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout source code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Set up Python 3.13
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"

      - name: Install Poetry
        run: pip3 install poetry==2.1.3

      - name: Install dependencies
        run: make setup

      - name: Get AWS Credentials
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          aws-region: eu-west-2
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}

      - name: Run E2E verification in SQS mode
        env:
          E2E_TRIGGER_MODE: sqs
          E2E_SEED_IF_MISSING: "false"
          E2E_RESTORE_ORIGINAL: "false"
          E2E_TIMEOUT_SECONDS: "300"
          E2E_URI: ${{ secrets.E2E_HEALTHCHECK_URI }}
          API_ENDPOINT: ${{ secrets.API_ENDPOINT }}
          API_USERNAME: ${{ secrets.API_USERNAME }}
          API_PASSWORD: ${{ secrets.API_PASSWORD }}
          AWS_REGION: eu-west-2
          SQS_ENRICHMENT_QUEUE_NAME: tna-s3-tna-staging-enrichment-queue
          RULES_FILE_BUCKET: staging-tna-s3-tna-sg-rules-bucket
          RULES_FILE_KEY: citation_patterns.jsonl
          VCITE_BUCKET: vcite-tna-files
          VCITE_ENRICHED_BUCKET: foo
        run: make test-e2e

  deploy_production:
    name: Deploy Production Build
    uses: ./.github/workflows/deploy_single_environment.yml
    needs: verify_staging_e2e
    if: ${{ needs.verify_staging_e2e.result == 'success' }}
    with:
      environment: production
    secrets:
      aws_oidc_role_arn: ${{ secrets.AWS_OIDC_ROLE_ARN_PROD }}
      account_id: ${{ secrets.PROD_ACCOUNT_ID }}
      workspace: tna-prod
      app_env: production
      vcite_enabled: ${{ secrets.VCITE_ENABLED }}
      api_endpoint: ${{ secrets.API_ENDPOINT }}
      api_username: ${{ secrets.API_USERNAME }}
      api_password: ${{ secrets.API_PASSWORD }}
      sparql_username: ${{ secrets.SPARQL_USERNAME }}
      sparql_password: ${{ secrets.SPARQL_PASSWORD }}
    permissions:
      id-token: write

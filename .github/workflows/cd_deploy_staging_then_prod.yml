name: Deploy to Staging then Prod

on:
  push:
    branches:
      - main

permissions:
  pull-requests: read
  contents: read

defaults:
  run:
    shell: bash

jobs:
  deploy_staging:
    name: Deploy Staging Build
    uses: ./.github/workflows/deploy_single_environment.yml
    with:
      environment: staging
    secrets:
      aws_oidc_role_arn: ${{ secrets.AWS_OIDC_ROLE_ARN }}
      account_id: ${{ secrets.STAGING_ACCOUNT_ID }}
      workspace: tna-staging
      app_env: staging
      vcite_enabled: ${{ secrets.VCITE_ENABLED }}
      api_username: ${{ secrets.API_USERNAME }}
      api_password: ${{ secrets.API_PASSWORD }}
      sparql_username: ${{ secrets.SPARQL_USERNAME }}
      sparql_password: ${{ secrets.SPARQL_PASSWORD }}
    permissions:
      id-token: write


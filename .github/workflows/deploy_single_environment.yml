on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
    secrets:
      aws_oidc_role_arn:
        required: true
      account_id:
        required: true
      workspace:
        required: true
      app_env:
        required: true
      vcite_enabled:
        required: true
      api_endpoint:
        required: true
      api_username:
        required: true
      api_password:
        required: true
      sparql_username:
        required: true
      sparql_password:
        required: true

jobs:
  setup-terraform-phase-1:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout source code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Set up Python 3.13
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"

      - name: Get AWS Credentials
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          aws-region: eu-west-2
          role-to-assume: ${{ secrets.aws_oidc_role_arn }}
        continue-on-error: false

      - name: Assemble Lambdas
        run: |
          set -e
          set -o pipefail
          ./scripts/assemble_lambda_contexts.sh

      - name: Get terraform version
        id: get-terraform-version
        run: |
          DOTFILE_VERSION=$(cat terraform/.terraform-version)
          echo "version=$DOTFILE_VERSION" >> $GITHUB_OUTPUT

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        continue-on-error: false
        with:
          terraform_version: ${{ steps.get-terraform-version.outputs.version }}

      - name: Terraform init
        run: |
          set -e
          set -o pipefail
          cd terraform
          terraform init -upgrade -input=false -backend-config="bucket=tna-terraform-backend-state-enrichment-pipeline-${{ secrets.account_id }}"
          terraform workspace list
        continue-on-error: false

      - name: "Terraform Phase 1: Create ECR Repositories"
        env:
          TF_VAR_vcite_enabled: ${{ secrets.vcite_enabled }}
          TF_VAR_api_endpoint: ${{ secrets.api_endpoint }}
          TF_VAR_api_username: ${{ secrets.api_username }}
          TF_VAR_api_password: ${{ secrets.api_password }}
          TF_VAR_sparql_username: ${{ secrets.sparql_username }}
          TF_VAR_sparql_password: ${{ secrets.sparql_password }}
        run: |
          set -e
          set -o pipefail
          cd terraform
          terraform workspace select ${{ secrets.workspace }}
          terraform apply --auto-approve -no-color \
            -target=module.lambda_s3.aws_ecr_repository.enrichment \
            -target=module.lambda_s3.aws_ecr_repository.db-backup \
            -target=module.lambda_s3.aws_ecr_repository.legislation-update \
            -target=module.lambda_s3.aws_ecr_repository.rules-update \
            -target=module.lambda_s3.aws_ecr_lifecycle_policy.enrichment_retention \
            -target=module.lambda_s3.aws_ecr_lifecycle_policy.db_backup_retention \
            -target=module.lambda_s3.aws_ecr_lifecycle_policy.lu_retention \
            -target=module.lambda_s3.aws_ecr_lifecycle_policy.ru_retention \
            -var "app_env=${{ secrets.app_env }}"

  build-and-push-lambda:
    name: Build and push ${{ matrix.lambda }}
    needs: setup-terraform-phase-1
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    strategy:
      fail-fast: false
      matrix:
        lambda:
          - enrichment_lambda
          - db_backup
          - update_legislation_table
          - update_rules_processor
        include:
          - lambda: enrichment_lambda
            ecr_repo: tna-s3-tna-ecr-repository-enrichment
          - lambda: db_backup
            ecr_repo: tna-s3-tna-ecr-repository-db-backup
          - lambda: update_legislation_table
            ecr_repo: tna-s3-tna-ecr-repository-legislation-update
          - lambda: update_rules_processor
            ecr_repo: tna-s3-tna-ecr-repository-rules-update
    steps:
      - name: Checkout source code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Get AWS Credentials
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          aws-region: eu-west-2
          role-to-assume: ${{ secrets.aws_oidc_role_arn }}
        continue-on-error: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
        with:
          install: true

      - name: Build and push ${{ matrix.lambda }}
        env:
          DOCKER_BUILDKIT: 1
        run: |
          set -e
          set -o pipefail

          aws ecr get-login-password --region eu-west-2 | docker login --username AWS --password-stdin ${{ secrets.account_id }}.dkr.ecr.eu-west-2.amazonaws.com

          make build-lambda LAMBDA=${{ matrix.lambda }} ASSEMBLED=1

      - name: Smoke test ${{ matrix.lambda }}
        env:
          DOCKER_BUILDKIT: 1
        run: make smoke-test LAMBDA=${{ matrix.lambda }}

      - name: Push ${{ matrix.lambda }} to ECR
        env:
          DOCKER_BUILDKIT: 1
        run: |
          set -e
          set -o pipefail

          aws ecr get-login-password --region eu-west-2 | docker login --username AWS --password-stdin ${{ secrets.account_id }}.dkr.ecr.eu-west-2.amazonaws.com

          IMAGE_REPO="${{ secrets.account_id }}.dkr.ecr.eu-west-2.amazonaws.com/${{ matrix.ecr_repo }}-${{ secrets.app_env }}"
          IMAGE_TAG="${{ github.sha }}"

          docker tag ${{ matrix.lambda }}:local ${IMAGE_REPO}:${IMAGE_TAG}
          docker push ${IMAGE_REPO}:${IMAGE_TAG}

          # Keep latest for operational convenience while deployments use immutable SHA tags.
          docker tag ${{ matrix.lambda }}:local ${IMAGE_REPO}:latest
          docker push ${IMAGE_REPO}:latest

  deploy-terraform-phase-2:
    name: Deploy infrastructure
    needs: build-and-push-lambda
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout source code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Get AWS Credentials
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          aws-region: eu-west-2
          role-to-assume: ${{ secrets.aws_oidc_role_arn }}
        continue-on-error: false

      - name: Get terraform version
        id: get-terraform-version
        run: |
          DOTFILE_VERSION=$(cat terraform/.terraform-version)
          echo "version=$DOTFILE_VERSION" >> $GITHUB_OUTPUT

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        continue-on-error: false
        with:
          terraform_version: ${{ steps.get-terraform-version.outputs.version }}

      - name: Terraform init
        run: |
          set -e
          set -o pipefail
          cd terraform
          terraform init -upgrade -input=false -backend-config="bucket=tna-terraform-backend-state-enrichment-pipeline-${{ secrets.account_id }}"
        continue-on-error: false

      - name: "Terraform Phase 2: Deploy Complete Infrastructure"
        env:
          TF_VAR_vcite_enabled: ${{ secrets.vcite_enabled }}
          TF_VAR_api_endpoint: ${{ secrets.api_endpoint }}
          TF_VAR_api_username: ${{ secrets.api_username }}
          TF_VAR_api_password: ${{ secrets.api_password }}
          TF_VAR_sparql_username: ${{ secrets.sparql_username }}
          TF_VAR_sparql_password: ${{ secrets.sparql_password }}
        run: |
          set -e
          set -o pipefail
          cd terraform
          terraform workspace select ${{ secrets.workspace }}
          terraform apply --auto-approve -no-color \
            -var "app_env=${{ secrets.app_env }}" \
            -var "container_image_tag=${{ github.sha }}"
